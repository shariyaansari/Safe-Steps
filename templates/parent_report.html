<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">

    <style>
        .container {
            padding: 20px;
        }

        #map {
            height: 400px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <ul>
        <li><a href="{{ url_for('parent.dashboard') }}">Home</a></li>
        <li><a href="{{ url_for('parent.report_incident') }}" class="active">Report Incident</a></li>
        <li><a href="{{ url_for('parent.analytics') }}">Analytics</a></li>
        <li><a href="{{ url_for('parent.user_settings') }}">User Settings</a></li>
        <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
    </ul>
</nav>

<div class="container">

    <h2>Report an Incident</h2>

    {% if message %}
        <p style="color:green;">{{ message }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('parent.submit_report') }}">

        <div class="form-group">
            <label>Date:</label>
            <input type="date" name="date" required>
        </div>

        <div class="form-group">
            <label>Time:</label>
            <input type="time" name="start_time" required>
            to
            <input type="time" name="end_time" required>
        </div>

        <div class="form-group">
            <label>Description:</label>
            <textarea name="description" required></textarea>
        </div>

        <div class="form-group">
            <label>Location:</label>
            <p>Click on the map to select a location.</p>

            <div id="map"></div>

            <input type="hidden" name="lat" id="lat">
            <input type="hidden" name="lng" id="lng">
        </div>

        <button type="submit">Submit Report</button>

    </form>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([19.0714, 72.8856], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        .addTo(map);

    let marker;

    map.on('click', function(e) {
        if (marker) map.removeLayer(marker);

        marker = L.marker(e.latlng).addTo(map);

        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lng').value = e.latlng.lng;
    });
</script>

</body>
</html>
