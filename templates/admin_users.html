<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>

    <link rel="stylesheet" href="{{ url_for('static', path='User.css') }}">
</head>

<body>

<h1>Admin Panel - Manage Users</h1>

<nav class="navbar">
    <ul>
        <li><a href="{{ url_for('home.home') }}">Home</a></li>
        <li><a href="{{ url_for('admin.reports') }}">Reports</a></li>
        <li><a href="{{ url_for('admin.analytics') }}">Analytics</a></li>
        <li><a href="{{ url_for('admin.users') }}">Users</a></li>
        <li><a href="{{ url_for('auth.logout') }}" class="logout">Logout</a></li>
    </ul>
</nav>

<div class="table-container">
    <h2>User Management</h2>

    {% if users %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.role }}</td>

                    <td class="action-buttons">

                        <!-- EDIT -->
                        <a href="{{ url_for('admin.edit_user', user_id=user.id) }}" class="btn-edit">
                            Edit
                        </a>

                        <!-- DELETE (FIXED: POST form instead of link) -->
                        <form action="{{ url_for('admin.delete_user', user_id=user.id) }}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Are you sure you want to delete this user?');">

                            <button type="submit" class="btn-delete">
                                Delete
                            </button>
                        </form>

                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No users found.</p>
    {% endif %}

</div>

</body>
</html>
