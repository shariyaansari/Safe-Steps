<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>

    <link rel="stylesheet" href="{{ url_for('static', path='settings.css') }}">

    <style>
        .form-container {
            max-width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-actions {
            margin-top: 20px;
        }

        .btn-save {
            padding: 8px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .btn-cancel {
            margin-left: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>Admin Panel - Edit User</h1>

<nav class="navbar">
    <ul>
        <li><a href="{{ url_for('home.home') }}">Home</a></li>
        <li><a href="{{ url_for('admin.reports') }}">Reports</a></li>
        <li><a href="{{ url_for('admin.analytics') }}">Analytics</a></li>
        <li><a href="{{ url_for('admin.users') }}">Users</a></li>
        <li><a href="{{ url_for('auth.logout') }}" class="logout">Logout</a></li>
    </ul>
</nav>

<div class="form-container">

    <h2>Edit User: {{ user.username }}</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        
        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" value="{{ user.username }}" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>

        <div class="form-group">
            <label>Role:</label>
            <select name="role">
                <option value="parent" {% if user.role == 'parent' %}selected{% endif %}>Parent</option>
                <option value="authorities" {% if user.role == 'authorities' %}selected{% endif %}>Authorities</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{{ url_for('admin.users') }}" class="btn-cancel">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
