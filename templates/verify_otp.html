<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>

    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">

    <style>
        .otp-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .otp-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 18px;
            letter-spacing: 2px;
            text-align: center;
        }

        .otp-container button {
            width: 100%;
            padding: 10px;
            background: #205781;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        .message {
            color: green;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="otp-container">

    <h2>Enter Verification Code</h2>
    <p>A 6-digit code has been sent to your email.</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.verify_otp') }}">
        <input
            type="text"
            name="otp_code"
            required
            maxlength="6"
            pattern="\d{6}"
            placeholder="000000"
        >

        <button type="submit">Verify</button>
    </form>

</div>

</body>
</html>
