<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">

    <style>
        .dashboard-container {
            padding: 20px;
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <ul>
        <li><a href="{{ url_for('home.home') }}">Home</a></li>
        <li><a href="{{ url_for('admin.reports') }}">Reports</a></li>
        <li><a href="{{ url_for('admin.analytics') }}">Analytics</a></li>
        <li><a href="{{ url_for('admin.users') }}">Users</a></li>
        <li><a href="{{ url_for('auth.logout') }}" class="logout">Logout</a></li>
    </ul>
</nav>

<div class="dashboard-container">
    <h1>Admin Dashboard</h1>

    <p>View real-time safety zones and crime data.</p>

    <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Optional: pass backend data later -->
{# Example:
<script>
    const incidents = {{ incidents | tojson | safe }};
</script>
#}

<!-- Custom JS -->
<script src="{{ url_for('static', path='script.js') }}"></script>

</body>
</html>
